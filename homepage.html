<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- DaisyUI and Tailwind -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
      * {
        scrollbar-width: none; /* Firefox */
        -ms-overflow-style: none; /* IE/Edge */
      }
      *::-webkit-scrollbar {
        display: none; /* Chrome, Safari, Opera */
      }
    </style>
    <title>HomePage | GitHub Issues Tracker</title>
  </head>
  <body>
    <!-- navbar -->
    <div class="navbar bg-base-100 shadow-sm">
      <div class="flex-1 mx-20">
        <div class="flex items-center">
          <img src="assets/github-logo.png" alt="" />
          <a class="btn btn-ghost text-[25px] font-bold"
            >GitHub Issues Tracker</a
          >
        </div>
      </div>
      <div class="flex gap-2 mx-20">
        <input
          id="input-search"
          type="text"
          placeholder="Search Issues"
          class="input input-bordered w-24 md:w-auto"
        />
        <div class="">
          <button id="search-btn" class="btn btn-primary text-center">
            New Issue +
          </button>
        </div>
      </div>
    </div>

    <!-- sections -->
    <div class="mt-[60px] ml-[245px] mr-[245px] bg-slate-200 p-5">
      <div>
        <div>
          <button id="btn-all" class="btn btn-primary">All</button>
          <button
            id="btn-opened"
            class="btn bg-white text-black border border-gray-300 hover:bg-gray-100"
          >
            Opened
          </button>
          <button
            id="btn-closed"
            class="btn bg-white text-black border border-gray-300 hover:bg-gray-100"
          >
            Closed
          </button>
        </div>
        <br /><br />
        <div id="counter-containers" class="flex justify-between items-center">
          <div class="flex gap-2">
            <img
              class="w-15 bg-slate-50 rounded-full p-2"
              src="assets/Aperture.png"
              alt=""
            />
            <h4>
              <span id="counter" class="font-semibold text-[25px]"
                >50 Issues</span
              >
              <br />
              <span style="color: rgba(100, 116, 139, 1)"
                >Track and manage your project issues</span
              >
            </h4>
          </div>
          <div class="flex gap-5">
            <p class="flex items-center gap-1">
              <span
                class="inline-block w-3 h-3 rounded-full bg-green-500"
              ></span
              >Opened
            </p>
            <p class="flex items-center gap-1">
              <span
                class="inline-block w-3 h-3 rounded-full bg-purple-500"
              ></span
              >Closed
            </p>
          </div>
        </div>
      </div>
    </div>

    <!-- issues card container -->

    <section
      id="issueCards"
      class="mt-[60px] ml-[245px] mr-[245px] bg-slate-100 p-5 grid grid-cols-3 mx-auto gap-5 items-stretch"
    >
      <!-- issues container -->
    </section>
    <script src="scripts/script.js"></script>
  </body>
</html>
